name: CI/CD — NSE F&O Scanner

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/nse-scanner

jobs:

  # ─── Backend tests ──────────────────────────────────────────────────────────
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short --no-header

      - name: Lint (ruff)
        run: |
          pip install ruff --quiet
          ruff check app/ --select=E,F,W --ignore=E501,W291 || true

  # ─── Frontend build & type-check ───────────────────────────────────────────
  test-frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ─── Integration test (backend + mock data) ─────────────────────────────────
  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: test-backend

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql+asyncpg://nse:nse123@localhost:5432/nse_scanner"
      REDIS_URL: "redis://localhost:6379/0"
      ANTHROPIC_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: cd backend && pip install -r requirements.txt

      - name: Run integration tests
        run: cd backend && pytest tests/ -v --tb=short -k "not db"

  # ─── Build & push Docker images ─────────────────────────────────────────────
  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to Render ────────────────────────────────────────────────────────
  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production

    steps:
      - name: Trigger Render deploy — backend
        run: |
          curl -sf -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'

      - name: Trigger Render deploy — frontend
        run: |
          curl -sf -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'

      - name: Wait for backend health
        run: |
          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 24); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              "https://${{ secrets.RENDER_BACKEND_URL }}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend healthy after ${i}x 10s = $((i*10))s"
              exit 0
            fi
            echo "  attempt $i: status=$STATUS — retrying..."
            sleep 10
          done
          echo "Backend did not become healthy in time — triggering rollback"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back to previous deploy"
          # Fetch the last successful deploy ID and redeploy it
          PREV=$(curl -sf \
            "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys?limit=5" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" | \
            python3 -c "import sys,json; deploys=json.load(sys.stdin); \
            ok=[d for d in deploys if d['deploy']['status']=='live']; \
            print(ok[1]['deploy']['id'] if len(ok)>1 else '')")
          if [ -n "$PREV" ]; then
            curl -sf -X POST \
              "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d "{\"deployId\": \"$PREV\"}"
            echo "Rollback deploy triggered: $PREV"
          fi

  # ─── Post-deploy smoke tests ────────────────────────────────────────────────
  smoke-test:
    name: Smoke tests
    runs-on: ubuntu-latest
    needs: deploy-render
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Check frontend loads
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "https://${{ secrets.RENDER_FRONTEND_URL }}" || echo "000")
          [ "$STATUS" = "200" ] && echo "Frontend OK ($STATUS)" || (echo "Frontend FAIL ($STATUS)" && exit 1)

      - name: Check API health
        run: |
          curl -sf "https://${{ secrets.RENDER_BACKEND_URL }}/health" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', d"
          echo "API health OK"

      - name: Check scanner API
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "https://${{ secrets.RENDER_BACKEND_URL }}/api/v1/scanner/signals" || echo "000")
          [ "$STATUS" = "200" ] && echo "Scanner API OK" || echo "Scanner API returned $STATUS (may be warming up)"

      - name: Check WebSocket
        run: |
          pip install websocket-client --quiet
          python3 - << 'PYEOF'
          import websocket, json, sys, time
          url = "wss://${{ secrets.RENDER_BACKEND_URL }}/ws".replace("https://","wss://").replace("http://","ws://")
          received = []
          def on_message(ws, msg):
              received.append(json.loads(msg))
              ws.close()
          def on_error(ws, err):
              print(f"WS error: {err}")
          ws = websocket.WebSocketApp(url, on_message=on_message, on_error=on_error)
          import threading
          t = threading.Thread(target=lambda: ws.run_forever())
          t.daemon = True
          t.start()
          time.sleep(8)
          if received:
              print(f"WebSocket OK — received message types: {[m.get('type') for m in received]}")
          else:
              print("WebSocket: no message received in 8s (may be cold start) — non-fatal")
          PYEOF
