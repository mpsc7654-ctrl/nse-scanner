# render.yaml — Render.com deployment
services:
  - type: web
    name: nse-scanner-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nse-scanner-db
          property: connectionString
      - key: REDIS_URL
        value: "redis://localhost:6379/0"
      - key: ANTHROPIC_API_KEY
        value: ""
      - key: DATA_FETCH_INTERVAL
        value: "60"
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: '["https://nse-scanner-frontend.onrender.com","https://nse-scanner-backend.onrender.com"]'

  - type: web
    name: nse-scanner-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    autoDeploy: true

databases:
  - name: nse-scanner-db
    plan: free
    databaseName: nse_scanner
    user: nse
