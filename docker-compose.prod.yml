version: "3.9"

# Production overlay — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  backend:
    environment:
      DEBUG: "false"
      CORS_ORIGINS: '["https://${DOMAIN}"]'

  frontend:
    ports: []   # Remove direct port — nginx handles it

  nginx:
    image: nginx:alpine
    container_name: nse_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx-prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  nginx_logs:
